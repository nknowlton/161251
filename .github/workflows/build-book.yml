name: Build & Deploy Book

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_enabled: ${{ steps.pages.outputs.enabled }}
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          packages: |
            tidyverse
            broom
            knitr
            formatR
            rmarkdown
            bookdown
            tsibble
            fable
            feasts
            lubridate
            DescTools
            car
            emmeans
            nlme
            lmtest
            glmnet
            patchwork
            kableExtra
            gridExtra
            GGally
            broom.mixed

      - name: Generate InClass and AsBook files
        working-directory: godfrey
        run: Rscript MakeFiles.R

      - name: Build bookdown
        working-directory: godfrey/AsBook
        run: Rscript -e 'bookdown::render_book("index.Rmd", output_format = "bookdown::gitbook")'

      - name: Copy downloadable Rmd files
        run: |
          mkdir -p godfrey/AsBook/Final/downloads
          cp godfrey/InClass/Lecture*.Rmd godfrey/AsBook/Final/downloads/

      - name: Add CNAME
        run: echo "knowlton.co.nz" > godfrey/AsBook/Final/CNAME

      - name: Check Pages availability
        id: pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          status="$(curl -sS -o /tmp/pages-response.json -w '%{http_code}' \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pages")"

          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          elif [ "$status" = "404" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            cat /tmp/pages-response.json
            exit 1
          fi

      - uses: actions/configure-pages@v6
        if: steps.pages.outputs.enabled == 'true'

      - uses: actions/upload-pages-artifact@v5
        if: steps.pages.outputs.enabled == 'true'
        with:
          path: godfrey/AsBook/Final

  deploy:
    if: needs.build.outputs.pages_enabled == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

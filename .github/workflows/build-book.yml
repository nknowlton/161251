name: Build & Deploy Book

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/configure-pages@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          packages: |
            tidyverse
            broom
            knitr
            formatR
            rmarkdown
            bookdown
            tsibble
            fable
            feasts
            lubridate
            DescTools
            car
            emmeans
            nlme
            lmtest
            glmnet
            patchwork
            kableExtra
            gridExtra
            GGally
            broom.mixed

      - name: Build bookdown
        run: Rscript scripts/render-book.R

      - name: Assemble Pages artifact
        run: Rscript scripts/assemble-site.R

      - name: Move site to _site for Pages
        run: |
          rm -rf _site
          cp -r build/site _site

      - name: Verify Pages artifact
        run: |
          required=(
            _site/index.html
            _site/161251/index.html
            _site/161251/notes/index.html
            _site/161251/labs/index.html
            _site/161251/widget/index.html
            _site/161251/labs/lab10A.Rmd
            _site/161251/labs/lab10B.Rmd
            _site/161251/labs/lab11A.Rmd
            _site/161251/labs/lab11B.Rmd
            _site/161251/labs/lab12A.Rmd
            _site/161251/labs/lab12B.Rmd
          )

          for file in "${required[@]}"; do
            test -f "$file"
          done

          test "$(find _site/161251/notes/downloads -maxdepth 1 -name '*.Rmd' | wc -l)" -gt 0
          ! rg -q -- '-sols\.Rmd' _site/161251/labs/index.html

      - uses: upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
name: Build & Deploy Book

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/configure-pages@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          packages: |
            tidyverse
            broom
            knitr
            formatR
            rmarkdown
            bookdown
            tsibble
            fable
            feasts
            lubridate
            DescTools
            car
            emmeans
            nlme
            lmtest
            glmnet
            patchwork
            kableExtra
            gridExtra
            GGally
            broom.mixed

      - name: Generate InClass and AsBook files
        working-directory: godfrey
        run: Rscript MakeFiles.R

      - name: Build bookdown
        working-directory: godfrey/AsBook
        run: Rscript -e 'bookdown::render_book("index.Rmd", output_format = "bookdown::gitbook")'

      - name: Copy downloadable Rmd files
        run: |
          mkdir -p godfrey/AsBook/Final/downloads
          cp godfrey/InClass/Lecture*.Rmd godfrey/AsBook/Final/downloads/

      - name: Assemble Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site/notes _site/labs _site/widget
          cp -r godfrey/AsBook/Final/. _site/notes/
          rm -f _site/notes/CNAME
          cp labs/*.Rmd _site/labs/
          cp site/index.html _site/index.html
          cp site/labs/index.html _site/labs/index.html
          cp site/widget/index.html _site/widget/index.html

      - name: Verify Pages artifact
        run: |
          required=(
            _site/index.html
            _site/notes/index.html
            _site/labs/index.html
            _site/widget/index.html
            _site/labs/lab10A.Rmd
            _site/labs/lab10B.Rmd
            _site/labs/lab11A.Rmd
            _site/labs/lab11B.Rmd
            _site/labs/lab12A.Rmd
            _site/labs/lab12B.Rmd
          )

          for file in "${required[@]}"; do
            test -f "$file"
          done

          test "$(find _site/notes/downloads -maxdepth 1 -name 'Lecture*.Rmd' | wc -l)" -gt 0
          ! rg -q -- '-sols\\.Rmd' _site/labs/index.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
